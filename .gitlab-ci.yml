workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

stages:
  - .pre
  - build
  - test

# Defaults
variables:
  SRC_DIR: '.'
  # Set to 'integration' or 'playwright' in the "Run Pipeline" UI to run only that job type
  RUN_ONLY: ''

include:
  - project: 'hyva-themes/base-ci'
    file: 'lint/php.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'static/phpcs.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/integration.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/playwright.yml'
    ref: main

# Override static jobs from includes to skip when RUN_ONLY is set
static:lint:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

static:phpcs:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

build:
  extends: .build:hyva
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['main']

test:integration:
  extends: .test:integration
  needs:
    - job: build
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['main']

test:playwright:
  extends: .test:playwright
  needs:
    - job: build
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: 'main'
        HYVA_PLAYWRIGHT_REF: 'main'
